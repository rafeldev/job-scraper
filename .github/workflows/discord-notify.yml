name: Discord Morning Notification

on:
  schedule:
    # 1 hora despues del Daily Job Scraper (08,12,18 UTC -> 09,13,19 UTC)
    - cron: "10 8,12,18 * * *"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  notify-discord:
    name: Send Discord Job Summary
    environment: job-scraper
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send Discord notification
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ALERT_THRESHOLD: ${{ secrets.DISCORD_ALERT_THRESHOLD }}
          NOTIFY_WINDOW_HOURS: ${{ secrets.NOTIFY_WINDOW_HOURS }}
          NOTIFY_TIMEZONE: America/Bogota
        run: |
          mkdir -p logs
          npm run notify:discord

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discord-notify-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
